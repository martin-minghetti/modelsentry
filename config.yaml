sources:
  rss:
    - name: HN Filtered
      url: https://hnrss.org/newest?q=claude+OR+anthropic+OR+llm+OR+openai
    - name: r/ClaudeAI
      url: https://www.reddit.com/r/ClaudeAI.rss
    - name: Claude Code Releases
      url: https://github.com/anthropics/claude-code/releases.atom
    - name: Anthropic SDK Python
      url: https://github.com/anthropics/anthropic-sdk-python/releases.atom
    - name: OpenAI Blog
      url: https://openai.com/blog/rss.xml
    - name: Google AI Blog
      url: https://blog.google/technology/ai/rss/
    - name: Simon Willison
      url: https://simonwillison.net/atom/everything/
    - name: AI News (smol.ai)
      url: https://buttondown.com/ainews/rss
  diff_pages:
    - name: OpenAI Pricing
      url: https://openai.com/api/pricing/
      selector: main
    - name: OpenAI Deprecations
      url: https://platform.openai.com/docs/deprecations
      selector: main
    - name: Anthropic Pricing
      url: https://www.anthropic.com/pricing
      selector: main
    - name: Anthropic Model Deprecations
      url: https://docs.anthropic.com/en/docs/resources/model-deprecations
      selector: main
    - name: Google Gemini Pricing
      url: https://ai.google.dev/pricing
      selector: main

keywords:
  include:
    - claude
    - anthropic
    - openai
    - gemini
    - llm
    - ai coding
    - model deprecation
    - pricing
    - rate limit
  exclude:
    - crypto
    - nft
    - stock price

llm:
  provider: gemini
  model: gemini-2.5-flash-lite

retention:
  latest_days: 30
  seen_urls_days: 90
